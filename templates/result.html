<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0F172A">
  <meta property="og:title"
      content="FishCount AI">

<meta property="og:description"
      content="YOLOv8 Fish Counting System">

<meta property="og:image"
      content="{{ url_for('static', filename='images/logo.png', _external=True) }}">
  <title>Hasil Deteksi – FishCountAI</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="icon"
      type="image/svg+xml"
      href="{{ url_for('static', filename='images/logo.svg') }}">
  <link rel="apple-touch-icon"
      href="{{ url_for('static', filename='images/logo.svg') }}">
</head>
<body>
  <canvas id="particle-canvas"></canvas>

  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
          <div class="brand-icon">
              <img
                  src="{{ url_for('static', filename='images/logo.svg') }}"
                  alt="FishCount AI Logo"
                  class="logo-svg">
          </div>

          <div class="brand-text">
              <span class="brand-name">
                  FishCount<span class="accent">AI</span>
                  <span class="v2-badge">v2</span>
              </span>

              <span class="brand-sub">
                  YOLOv8 Fish Detection & Counting System
              </span>
          </div>
      </div>
      <nav class="main-nav">
        <a href="{{ url_for('index') }}" class="nav-link">Beranda</a>
        <a href="{{ url_for('about') }}" class="nav-link">Tentang</a>
      </nav>
    </div>
  </header>

  <main id="result-main">
    <p style="text-align:center;padding:4rem;color:var(--text-muted)">
      Halaman ini diisi secara dinamis melalui JavaScript di halaman utama.
    </p>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <span>FishCount<span class="accent">AI</span></span>
        <span class="footer-dot">·</span>
        <span>Computer Vision-Based Fish Counting System</span>
      </div>
      <div class="footer-meta">Mata Kuliah Pengolahan Citra · 2026</div>
    </div>
  </footer>

  <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
